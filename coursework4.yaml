apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: aki-detection-state
  namespace: huashan
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aki-detection
  namespace: huashan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aki-detection
  template:
    metadata:
      labels:
        app: aki-detection
    spec:
      containers:
      - name: aki-detection
        image: imperialswemlsspring2026.azurecr.io/coursework4-huashan
        command: ["/app/bin/python", "main.py"]
        env:
        - name: MLLP_ADDRESS
          value: huashan-simulator.coursework4:8440
        - name: PAGER_ADDRESS
          value: huashan-simulator.coursework4:8441
        - name: DB_PATH
          value: /state/patient.db
        - name: HISTORY_CSV
          value: /data/history.csv
        - name: TRAINING_CSV
          value: /app/training.csv
        ports:
        - name: http
          containerPort: 8000
        volumeMounts:
          - mountPath: "/data"
            name: hospital-history
            readOnly: true
          - mountPath: "/state"
            name: aki-detection-state
        resources:
          requests:
            memory: 900Mi
            cpu: 1
      initContainers:
      - name: copy-hospital-history
        image: imperialswemlsspring2026.azurecr.io/coursework4-history
        volumeMounts:
          - mountPath: "/data"
            name: hospital-history
        resources:
          requests:
            memory: 900Mi
            cpu: 1
      volumes:
      - name: hospital-history
        emptyDir:
          sizeLimit: 50Mi
      - name: aki-detection-state
        persistentVolumeClaim:
          claimName: aki-detection-state
